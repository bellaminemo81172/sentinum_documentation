/* ============================================================
   SENTINUM – HUBSPOT TECHNICAL CONTENT
   Global Base Stylesheet (Stable)
   ------------------------------------------------------------
   Usage:
   • Paste inside a <style> block in a HubSpot HTML module
   • Do NOT edit spacing unless necessary
   • H1 = article title
   • H2 = article subtitle
   • H3 = section titles (TOC items)
   ============================================================ */

/* ---------- Fonts ---------- */
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Nunito:wght@400;600;700&display=swap');

/* ---------- Design Tokens ---------- */
:root{
  --black:#000000;
  --text-main:#111827;
  --text-muted:#6b7280;

  --border:#d0d7de;
  --table-header:#f5f7fa;

  --blue-bg:#f0f8ff;
  --blue-border:#a0c4ff;
  --blue-text:#1a3e8c;

  --toc-bg:#f7fbff;
  --toc-border:#d6e4fa;
}

/* ---------- Base ---------- */
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:"Nunito","Segoe UI",Helvetica,Arial,sans-serif;
  color:var(--text-main);
  line-height:1.65;
  background:#ffffff;
}

.container{
  width:100%;
  margin:0;
  padding:0;
}

/* ---------- Headings ---------- */

/* H1 – Article / Blog title */
h1{
  margin:48px 0 16px;
  padding-bottom:12px;
  font-family:"Montserrat",Arial,sans-serif;
  font-size:42px;
  font-weight:700;
  line-height:1.25;
  color:#000;
  border-bottom:2px solid var(--border);
}

/* H2 – Subtitle under article title */
h2{
  margin:14px 0 36px;
  font-family:"Nunito","Segoe UI",Helvetica,Arial,sans-serif;
  font-size:24px;
  font-weight:500;
  line-height:1.5;
  color:var(--text-muted);
}

/* H3 – Section titles (TOC items) */
h3{
  margin:24px 0 8px;
  padding-bottom:6px;
  font-family:"Montserrat",Arial,sans-serif;
  font-size:18px;
  font-weight:600;
  color:#000;
  border-bottom:1.5px solid var(--border);
  scroll-margin-top:100px; /* keeps anchors visible under HubSpot header */
}

/* ---------- Paragraphs ---------- */
p{
  margin:8px 0 12px;
}

/* ---------- PDF Viewer ---------- */
.pdf-viewer{
  max-width:900px;
  height:600px;
  margin:0 auto 20px;
  border:1px solid #ccc;
  border-radius:6px;
  overflow:hidden;
}

.pdf-viewer iframe{
  width:100%;
  height:100%;
  border:none;
}

/* ---------- PDF Download Box ---------- */
.pdf-download{
  max-width:900px;
  margin:0 auto 36px;
  padding:14px 18px;
  background:var(--blue-bg);
  border:1px solid var(--blue-border);
  border-radius:6px;
  text-align:center;
}

.pdf-download a{
  color:var(--blue-text);
  font-weight:600;
}

/* ---------- Table of Contents ---------- */
.main-toc{
  max-width:900px;
  margin:0 auto 40px;
  padding:16px 20px;
  background:var(--toc-bg);
  border:1px solid var(--toc-border);
  border-radius:6px;
}

.main-toc ul{
  list-style:none;
  margin:0;
  padding:0;
}

.main-toc li{
  margin:.3rem 0;
}

.main-toc a{
  color:var(--blue-text);
  font-weight:600;
  text-decoration:none;
}

/* ---------- Tables ---------- */
.table-wrap{
  margin:8px 0 20px;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#ffffff;
  font-size:14px;
}

th, td{
  border:1px solid var(--border);
  padding:8px 12px;
  text-align:left;
  vertical-align:top;
}

th{
  background:var(--table-header);
  font-weight:700;
}

/* ---------- Figures ---------- */
.figure{
  margin:32px auto;
  text-align:center;
}

.figure img{
  max-width:100%;
  height:auto;
}

.figure figcaption{
  margin-top:8px;
  font-size:.85rem;
  color:var(--text-muted);
  font-style:italic;
}

/* ---------- Footer / Disclaimer ---------- */
.footer-note{
  margin-top:40px;
  padding-top:16px;
  border-top:1px solid var(--border);
  font-size:.82rem;
  color:var(--text-muted);
}

.footer-note p{
  margin:0; /* single compact disclaimer block */
}
